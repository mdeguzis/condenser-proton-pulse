name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Read plugin metadata
        id: meta
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          mkdir -p release
          cp dist/frontend.js dist/backend.cjs release/
          cd release
          zip -r "../${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.zip" .

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum "${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.zip" | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.zip
          body: |
            ## ${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.version }}

            **SHA256:** `${{ steps.sha.outputs.sha256 }}`

            ### Registry submission YAML snippet
            Add this to your version file when submitting to condenser-registry:
            ```yaml
            files:
              - name: ${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.version }}
                url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.zip
                sha256: ${{ steps.sha.outputs.sha256 }}
                encodingFormat: application/zip
                license: https://spdx.org/licenses/MIT.html
                operatingSystem: [linux, macos, windows]
                processorRequirements: [x86_64, arm64]
            ```
